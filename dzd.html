<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Gaidot dzimšanas dienu</h1>
        <hr>
 
        <form>
            <p>Ievadi pilnu datumu, kad Tev būs tuvākā dzimšanas diena</p>
            <br>
            <label for="gads">gads</label>
            <input type="text" id="gads">
            <br><br>
            <label for="menesis">mēnesis</label>
            <input type="text" id="menesis">
            <br><br>
            <label for="diena">diena</label>
            <input type="text" id="datums">
            <br><br>
            <input value="Aprēķināt dienu skaitu līdz dzimšanas dienai" name="poga" onclick="dienas()" type="button">
            <p>Līdz svētkiem atlikušas</p>
            <input type="text" id="kopā">
            <label for="kopā">dienas :))</label>
        </form> 
              
            <script>
                function dienas(){
                    var gads=document.getElementById("gads").value;
                    var menesis=document.getElementById("menesis").value;
                    var diena=document.getElementById("datums").value;
                    var sodien = new Date();
                    var sogad=sodien.getFullYear();

                var dzdiena = new Date(sogad, menesis - 1, diena);

                if (dzdiena<sodien) {
                    dzdiena = new Date(sogad + 1, menesis - 1, diena);
                }
                var starpiba=Math.round((dzdiena-sodien)/1000/60/60/24);
               
                document.getElementById("kopā").value=starpiba;
                }
            </script>       
    </body>
